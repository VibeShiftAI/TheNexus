<svg width="1600" height="750" viewBox="0 0 1600 750" xmlns="http://www.w3.org/2000/svg" style="background-color: #0f172a; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <linearGradient id="grad-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-emerald" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-gold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" />
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c084fc" />
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
    </marker>
    <marker id="arrow-gold" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24" />
    </marker>
    <marker id="arrow-pink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f472b6" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444" />
    </marker>
    <marker id="arrow-indigo" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#818cf8" />
    </marker>
  </defs>

  <style>
    path, line, polyline { fill: none; }
    .flow-line { stroke-dasharray: 10, 10; animation: flow 1s linear infinite; }
    @keyframes flow { to { stroke-dashoffset: -20; } }
    .node-box { fill: #1e293b; stroke-width: 2; }
    .text-title { font-weight: bold; fill: white; text-anchor: middle; font-size: 13px; }
    .text-label { fill: #94a3b8; text-anchor: middle; font-size: 10px; }
    .group-label { font-weight: bold; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; }
    .service-label { font-weight: bold; font-size: 11px; }
    .step-num { font-weight: bold; font-size: 9px; fill: #0f172a; }
  </style>

  <!-- BACKGROUND GRID -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" stroke-opacity="0.3"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- ======================== 1. AI TERMINAL (ENTRY) ======================== -->
  <g transform="translate(30, 80)">
    <rect x="0" y="0" width="150" height="90" rx="10" stroke="#06b6d4" fill="#0f172a" stroke-width="2" filter="url(#glow-cyan)" />
    <text x="75" y="30" class="text-title" fill="#22d3ee" font-size="12">AI TERMINAL</text>
    <text x="75" y="48" class="text-label" font-size="9">Mode: Agent</text>
    <text x="75" y="62" class="text-label" font-size="9">handleSend()</text>
    <path d="M30,75 L120,75" stroke="#06b6d4" stroke-width="2" />
    <circle cx="35" cy="75" r="3" fill="#22d3ee">
      <animate attributeName="cx" from="30" to="120" dur="1.5s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Step 1 badge -->
  <circle cx="50" cy="78" r="8" fill="#22d3ee" />
  <text x="50" y="82" class="step-num" text-anchor="middle">1</text>

  <!-- Path: Terminal -> Nexus Server -->
  <path d="M180,125 L250,125" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-cyan)" class="flow-line" />
  <text x="215" y="118" class="text-label" font-size="8">POST /api/ai/chat</text>

  <!-- ======================== 2. NEXUS SERVER (PROXY) ======================== -->
  <g transform="translate(250, 90)">
    <rect x="0" y="0" width="140" height="70" rx="8" stroke="#34d399" fill="#022c22" stroke-width="1.5" />
    <text x="70" y="25" class="text-title" fill="#34d399" font-size="11">NEXUS SERVER</text>
    <text x="70" y="42" class="text-label" font-size="8">server.js proxy</text>
    <text x="70" y="55" class="text-label" font-size="8">mode=agent → Python</text>
  </g>

  <!-- Step 2 badge -->
  <circle cx="270" cy="88" r="8" fill="#34d399" />
  <text x="270" y="92" class="step-num" text-anchor="middle">2</text>

  <!-- Path: Nexus Server -> Python Bridge -->
  <path d="M390,125 L470,125" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-emerald)" class="flow-line" />
  <text x="430" y="118" class="text-label" font-size="8">Port 8000</text>

  <!-- ======================== 3. TERMINAL BRIDGE ======================== -->
  <g transform="translate(470, 90)">
    <rect x="0" y="0" width="150" height="70" rx="8" stroke="#818cf8" fill="#1e1b4b" stroke-width="1.5" />
    <text x="75" y="25" class="text-title" fill="#a5b4fc" font-size="11">TERMINAL BRIDGE</text>
    <text x="75" y="42" class="text-label" font-size="8">terminal_bridge.py</text>
    <text x="75" y="55" class="text-label" font-size="8">CortexBrainBridge</text>
  </g>

  <!-- Step 3 badge -->
  <circle cx="490" cy="88" r="8" fill="#818cf8" />
  <text x="490" y="92" class="step-num" text-anchor="middle">3</text>

  <!-- Path: Bridge -> Orchestrator -->
  <path d="M620,125 L620,195" stroke="#c084fc" stroke-width="2" marker-end="url(#arrow-purple)" class="flow-line" />

  <!-- ======================== 4. THE CORTEX (MAIN ORCHESTRATOR) ======================== -->
  <g transform="translate(100, 195)">
    <!-- Container -->
    <rect x="0" y="0" width="1050" height="530" rx="15" stroke="#9333ea" fill="#1e1b4b" stroke-width="2" stroke-opacity="0.6" />
    <text x="525" y="28" class="group-label" fill="#c084fc" text-anchor="middle">THE CORTEX — LangGraph System 2 Orchestrator</text>

    <!-- ── ENTRY: Thinker ── -->
    <g transform="translate(430, 45)">
      <rect x="0" y="0" width="130" height="45" rx="6" fill="#3b0764" stroke="#c084fc" stroke-width="1.5" />
      <text x="65" y="20" class="text-title" font-size="11">🧠 Thinker</text>
      <text x="65" y="36" class="text-label" font-size="8">Complexity Analysis</text>
    </g>

    <!-- Step 4 badge -->
    <circle cx="440" cy="52" r="8" fill="#c084fc" />
    <text x="440" y="56" class="step-num" text-anchor="middle">4</text>

    <!-- Complexity Branch -->
    <path d="M495,90 L495,115" stroke="#c084fc" stroke-width="1.5" />
    <!-- Diamond (decision) -->
    <polygon points="495,115 515,135 495,155 475,135" fill="#3b0764" stroke="#fbbf24" stroke-width="1.5" />
    <text x="495" y="139" fill="#fbbf24" font-size="8" text-anchor="middle" font-weight="bold">C?</text>

    <!-- FAST PATH (left) -->
    <path d="M475,135 L300,135 L300,175" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)" />
    <text x="370" y="130" fill="#22d3ee" font-size="8" font-weight="bold">≤ 4 (Fast)</text>

    <g transform="translate(230, 175)">
      <rect x="0" y="0" width="140" height="40" rx="5" fill="#0c4a6e" stroke="#22d3ee" stroke-width="1.5" />
      <text x="70" y="17" class="text-title" font-size="10">⚡ Planner (Fast)</text>
      <text x="70" y="32" class="text-label" font-size="8">Skip deliberation</text>
    </g>

    <path d="M300,215 L300,240" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)" />

    <g transform="translate(235, 240)">
      <rect x="0" y="0" width="130" height="35" rx="5" fill="#3b0764" stroke="#c084fc" stroke-width="1.5" />
      <text x="65" y="22" class="text-title" font-size="10">🔧 Compiler</text>
    </g>

    <path d="M300,275 L300,310 L510,310 L510,380" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)" stroke-dasharray="5,3" />

    <!-- FULL PATH (right) -->
    <path d="M515,135 L700,135 L700,175" stroke="#c084fc" stroke-width="1.5" marker-end="url(#arrow-purple)" />
    <text x="610" y="130" fill="#c084fc" font-size="8" font-weight="bold">> 4 (Full)</text>

    <!-- Planner -->
    <g transform="translate(630, 175)">
      <rect x="0" y="0" width="140" height="40" rx="5" fill="#3b0764" stroke="#c084fc" stroke-width="1.5" />
      <text x="70" y="17" class="text-title" font-size="10">📝 Planner</text>
      <text x="70" y="32" class="text-label" font-size="8">MarkdownPlan Drafting</text>
    </g>

    <!-- Step 5 -->
    <circle cx="640" cy="182" r="8" fill="#c084fc" />
    <text x="640" y="186" class="step-num" text-anchor="middle">5</text>

    <!-- Planner -> Simulator -->
    <path d="M700,215 L700,240" stroke="#c084fc" stroke-width="1.5" marker-end="url(#arrow-purple)" />

    <!-- Simulator -->
    <g transform="translate(630, 240)">
      <rect x="0" y="0" width="140" height="40" rx="5" fill="#3b0764" stroke="#a855f7" stroke-width="1.5" />
      <text x="70" y="17" class="text-title" font-size="10">🎭 Simulator</text>
      <text x="70" y="32" class="text-label" font-size="8">Pre-flight Failure Analysis</text>
    </g>

    <!-- Simulator -> Voters -->
    <path d="M700,280 L700,305" stroke="#c084fc" stroke-width="1.5" marker-end="url(#arrow-purple)" />

    <!-- Voters -->
    <g transform="translate(610, 305)">
      <rect x="0" y="0" width="180" height="55" rx="5" fill="#3b0764" stroke="#c084fc" stroke-width="1.5" />
      <text x="90" y="18" class="text-title" font-size="10">🗳️ Society of Minds</text>
      <text x="90" y="33" class="text-label" font-size="8">Critic • Safety • Efficiency</text>
      <text x="90" y="46" class="text-label" font-size="7" fill="#fbbf24">asyncio.gather() parallel</text>
    </g>

    <!-- Voters -> Fact Check -->
    <path d="M700,360 L700,380" stroke="#c084fc" stroke-width="1.5" marker-end="url(#arrow-purple)" />

    <!-- Fact Check (voter claims) -->
    <g transform="translate(640, 380)">
      <rect x="0" y="0" width="120" height="35" rx="5" fill="#451a03" stroke="#f59e0b" stroke-width="1.5" />
      <text x="60" y="22" class="text-title" font-size="10">🔍 Fact Check</text>
    </g>

    <!-- Fact Check -> Vote Decision -->
    <path d="M700,415 L700,435" stroke="#f59e0b" stroke-width="1.5" />

    <!-- Vote Decision Diamond -->
    <polygon points="700,435 720,455 700,475 680,455" fill="#3b0764" stroke="#fbbf24" stroke-width="1.5" />
    <text x="700" y="459" fill="#fbbf24" font-size="7" text-anchor="middle" font-weight="bold">V?</text>

    <!-- Unanimous -> Human Review -->
    <path d="M720,455 L870,455 L870,310" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-gold)" />
    <text x="830" y="395" fill="#34d399" font-size="7" font-weight="bold" transform="rotate(-90 830,395)">Unanimous</text>

    <!-- Human Review -->
    <g transform="translate(820, 260)">
      <rect x="0" y="0" width="130" height="50" rx="20" fill="#4c1d95" stroke="#fbbf24" stroke-width="2" filter="url(#glow-gold)" />
      <text x="65" y="22" class="text-title" fill="#fbbf24" font-size="10">⏸️ HUMAN REVIEW</text>
      <text x="65" y="38" class="text-label" font-size="7" fill="#fde68a">interrupt_before</text>
    </g>

    <!-- Step 6 -->
    <circle cx="830" cy="258" r="8" fill="#fbbf24" />
    <text x="830" y="262" class="step-num" text-anchor="middle">6</text>

    <!-- Approve -> Compiler -> Execution -->
    <path d="M950,285 L990,285 L990,350" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)" />
    <text x="980" y="320" fill="#34d399" font-size="7" font-weight="bold">Approve</text>

    <!-- Reject -> back to Planner -->
    <path d="M885,310 L885,490 L700,490 L700,215" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-red)" />
    <text x="810" y="502" fill="#ef4444" font-size="7">Reject → Revise</text>

    <!-- Compiler (full path) -->
    <g transform="translate(935, 350)">
      <rect x="0" y="0" width="100" height="35" rx="5" fill="#3b0764" stroke="#c084fc" stroke-width="1.5" />
      <text x="50" y="22" class="text-title" font-size="10">🔧 Compiler</text>
    </g>

    <!-- Compiler -> Execution -->
    <path d="M985,385 L985,410" stroke="#c084fc" stroke-width="1.5" marker-end="url(#arrow-purple)" />

    <!-- Rejected vote -> Aggregate -> Planner (loop) -->
    <path d="M680,455 L150,455 L150,355" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-red)" />
    <text x="200" y="448" fill="#ef4444" font-size="7">Rejected</text>

    <!-- Aggregate Comments -->
    <g transform="translate(90, 315)">
      <rect x="0" y="0" width="120" height="35" rx="5" fill="#450a0a" stroke="#ef4444" stroke-width="1" />
      <text x="60" y="15" class="text-title" font-size="9" fill="#fca5a5">📝 Aggregate</text>
      <text x="60" y="28" class="text-label" font-size="7">Line Comments</text>
    </g>

    <!-- Aggregate -> Planner loop -->
    <path d="M150,315 L150,195 L630,195" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-red)" />
    <text x="350" y="188" fill="#ef4444" font-size="7">Revision Loop</text>

    <!-- Info needed -> Researcher -> Planner -->
    <path d="M700,475 L700,500 L50,500 L50,250" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4,3" />
    <text x="350" y="510" fill="#60a5fa" font-size="7">REQUEST_INFO</text>

    <!-- Researcher -->
    <g transform="translate(10, 250)">
      <rect x="0" y="0" width="110" height="40" rx="5" fill="#172554" stroke="#3b82f6" stroke-width="1" />
      <text x="55" y="17" class="text-title" font-size="9" fill="#60a5fa">🔍 Researcher</text>
      <text x="55" y="32" class="text-label" font-size="7">Nexus Fleet API</text>
    </g>

    <!-- Researcher -> Planner -->
    <path d="M65,250 L65,195 L630,195" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-cyan)" />

    <!-- EXECUTION NODE -->
    <g transform="translate(440, 410)">
      <rect x="0" y="0" width="140" height="45" rx="6" fill="#064e3b" stroke="#34d399" stroke-width="2" filter="url(#glow-cyan)" />
      <text x="70" y="20" class="text-title" fill="#34d399" font-size="11">🚀 Execution</text>
      <text x="70" y="36" class="text-label" font-size="8" fill="#6ee7b7">Create Project + Tasks</text>
    </g>

    <!-- Step 7 badge -->
    <circle cx="450" cy="418" r="8" fill="#34d399" />
    <text x="450" y="422" class="step-num" text-anchor="middle">7</text>

    <!-- Fast path merges into execution -->
    <!-- Full path compiler -> execution -->
    <path d="M935,367 L580,430" stroke="#c084fc" stroke-width="1.5" marker-end="url(#arrow-purple)" stroke-dasharray="5,3" />

    <!-- Execution -> Exit Pipeline (below) -->
    <path d="M510,455 L510,485" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)" />
  </g>


  <!-- Arrow: Execution -> Nexus -->
  <path d="M690,610 L1200,350" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-emerald)" class="flow-line" stroke-opacity="0.6" />
  <text x="950" y="470" fill="#34d399" font-size="8" font-weight="bold">NexusClient API</text>

  <!-- Title watermark -->
  <text x="800" y="50" fill="#334155" font-size="22" text-anchor="middle" font-weight="bold" letter-spacing="3" opacity="0.4">THE CORTEX — FULL DATA FLOW TRACE</text>

</svg>
