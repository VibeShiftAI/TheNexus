<svg width="1920" height="650" viewBox="0 0 1920 650" xmlns="http://www.w3.org/2000/svg" style="background-color: #0f172a; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-gold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-emerald" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" />
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c084fc" />
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
    </marker>
    <marker id="arrow-gold" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444" />
    </marker>
  </defs>

  <style>
    path, line, polyline { fill: none; }
    .flow-line { stroke-dasharray: 8, 6; animation: flow 1s linear infinite; }
    @keyframes flow { to { stroke-dashoffset: -14; } }
    .text-title { font-weight: bold; fill: white; text-anchor: middle; font-size: 12px; }
    .text-label { fill: #94a3b8; text-anchor: middle; font-size: 9px; }
    .step-num { font-weight: bold; font-size: 8px; fill: #0f172a; }
    .reviewer-box { fill: #1e1b4b; stroke-width: 1; rx: 5; }
  </style>

  <!-- BACKGROUND GRID -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" stroke-opacity="0.25"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Title watermark -->
  <text x="960" y="35" fill="#334155" font-size="18" text-anchor="middle" font-weight="bold" letter-spacing="4" opacity="0.35">END-TO-END DATA FLOW</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- ROW 1: ENTRY + ROUTING                                        -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <!-- ── 1. AI TERMINAL ── -->
  <g transform="translate(30, 55)">
    <rect x="0" y="0" width="130" height="50" rx="8" stroke="#06b6d4" fill="#0c4a6e" stroke-width="2" filter="url(#glow-cyan)" />
    <text x="65" y="22" class="text-title" fill="#22d3ee" font-size="11">AI TERMINAL</text>
    <text x="65" y="38" class="text-label" font-size="8">Agent Mode</text>
    <circle cx="-5" cy="-5" r="9" fill="#22d3ee" />
    <text x="-5" y="-1" class="step-num" text-anchor="middle">1</text>
  </g>

  <!-- 1 → 2 -->
  <path d="M160,80 L210,80" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-cyan)" class="flow-line" />

  <!-- ── 2. NEXUS SERVER ── -->
  <g transform="translate(210, 55)">
    <rect x="0" y="0" width="130" height="50" rx="8" stroke="#34d399" fill="#064e3b" stroke-width="1.5" />
    <text x="65" y="22" class="text-title" fill="#34d399" font-size="11">NEXUS SERVER</text>
    <text x="65" y="38" class="text-label" font-size="8">Proxy → Python</text>
    <circle cx="-5" cy="-5" r="9" fill="#34d399" />
    <text x="-5" y="-1" class="step-num" text-anchor="middle">2</text>
  </g>

  <!-- 2 → 3 -->
  <path d="M340,80 L400,80" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-purple)" class="flow-line" />

  <!-- ── 3. CHAT ROUTER ── -->
  <g transform="translate(400, 55)">
    <rect x="0" y="0" width="120" height="50" rx="8" stroke="#c084fc" fill="#3b0764" stroke-width="1.5" />
    <text x="60" y="22" class="text-title" fill="#c084fc" font-size="11">🔀 Chat Router</text>
    <text x="60" y="38" class="text-label" font-size="8">Intent Detection</text>
    <circle cx="-5" cy="-5" r="9" fill="#c084fc" />
    <text x="-5" y="-1" class="step-num" text-anchor="middle">3</text>
  </g>

  <!-- Router Decision Diamond -->
  <path d="M460,105 L460,125" stroke="#c084fc" stroke-width="1.5" />
  <polygon points="460,125 478,143 460,161 442,143" fill="#3b0764" stroke="#fbbf24" stroke-width="1.5" />
  <text x="460" y="147" fill="#fbbf24" font-size="8" text-anchor="middle" font-weight="bold">?</text>

  <!-- Chat branch (left exit) -->
  <path d="M442,143 L340,143" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)" />
  <text x="380" y="136" fill="#22d3ee" font-size="7" font-weight="bold">chat</text>
  <g transform="translate(235, 126)">
    <rect x="0" y="0" width="105" height="34" rx="5" fill="#0c4a6e" stroke="#22d3ee" stroke-width="1" />
    <text x="53" y="15" class="text-title" font-size="9" fill="#22d3ee">💬 Chat Response</text>
    <text x="53" y="28" class="text-label" font-size="7">Direct LLM → END</text>
  </g>

  <!-- Build branch (down) -->
  <path d="M460,161 L460,190" stroke="#c084fc" stroke-width="1.5" marker-end="url(#arrow-purple)" />
  <text x="475" y="178" fill="#c084fc" font-size="7" font-weight="bold">build</text>

  <!-- ── 4. ARCHITECT ── -->
  <g transform="translate(400, 190)">
    <rect x="0" y="0" width="120" height="48" rx="8" stroke="#c084fc" fill="#3b0764" stroke-width="1.5" />
    <text x="60" y="20" class="text-title" fill="#c084fc" font-size="11">🧠 Architect</text>
    <text x="60" y="36" class="text-label" font-size="8">Draft MarkdownPlan</text>
    <circle cx="-5" cy="-5" r="9" fill="#c084fc" />
    <text x="-5" y="-1" class="step-num" text-anchor="middle">4</text>
  </g>

  <!-- ── BLACKBOARD (left of Architect) ── -->
  <g transform="translate(250, 196)">
    <rect x="0" y="0" width="120" height="36" rx="6" fill="#1a1a2e" stroke="#f472b6" stroke-width="1" stroke-dasharray="4 2" />
    <text x="60" y="15" class="text-title" font-size="9" fill="#f472b6">📋 Blackboard</text>
    <text x="60" y="28" class="text-label" font-size="7">Shared Memory</text>
  </g>
  <!-- Dotted line Blackboard ↔ Architect -->
  <path d="M370,214 L400,214" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="3,3" />

  <!-- 4 → 5: Architect → Council -->
  <path d="M520,214 L590,214" stroke="#c084fc" stroke-width="2" marker-end="url(#arrow-purple)" class="flow-line" />

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- CENTER: EXPANDED COUNCIL REVIEW                                -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <!-- ── 5. COUNCIL REVIEW (expanded area) ── -->
  <g transform="translate(590, 60)">
    <!-- Council container (subtle) -->
    <rect x="0" y="0" width="420" height="290" rx="12" fill="#0f172a" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="6 3" />
    <text x="210" y="22" fill="#c084fc" font-size="13" text-anchor="middle" font-weight="bold" letter-spacing="1">🗳️ COUNCIL REVIEW</text>
    <text x="210" y="38" class="text-label" font-size="8">asyncio.gather — Unique Models (anti-groupthink)</text>
    <circle cx="10" cy="8" r="9" fill="#c084fc" />
    <text x="10" y="12" class="step-num" text-anchor="middle">5</text>

    <!-- 4 Reviewers in parallel -->
    <!-- Frontend/UX -->
    <g transform="translate(30, 55)">
      <rect x="0" y="0" width="165" height="52" rx="6" class="reviewer-box" stroke="#a78bfa" />
      <text x="83" y="18" class="text-title" font-size="10" fill="#a78bfa">🎨 Frontend/UX</text>
      <text x="83" y="32" class="text-label" font-size="7">Components • A11y • Responsive</text>
      <text x="83" y="44" class="text-label" font-size="7" fill="#818cf8">→ VoteReceipt + LineComments</text>
    </g>

    <!-- Systems Engineer -->
    <g transform="translate(215, 55)">
      <rect x="0" y="0" width="165" height="52" rx="6" class="reviewer-box" stroke="#a78bfa" />
      <text x="83" y="18" class="text-title" font-size="10" fill="#a78bfa">⚙️ Systems Engineer</text>
      <text x="83" y="32" class="text-label" font-size="7">DB • API • Auth • Security</text>
      <text x="83" y="44" class="text-label" font-size="7" fill="#818cf8">→ VoteReceipt + LineComments</text>
    </g>

    <!-- QA Strategist -->
    <g transform="translate(30, 117)">
      <rect x="0" y="0" width="165" height="52" rx="6" class="reviewer-box" stroke="#a78bfa" />
      <text x="83" y="18" class="text-title" font-size="10" fill="#a78bfa">🧪 QA Strategist</text>
      <text x="83" y="32" class="text-label" font-size="7">Acceptance Criteria • Edge Cases</text>
      <text x="83" y="44" class="text-label" font-size="7" fill="#818cf8">→ VoteReceipt + LineComments</text>
    </g>

    <!-- Gap Analyst -->
    <g transform="translate(215, 117)">
      <rect x="0" y="0" width="165" height="52" rx="6" class="reviewer-box" stroke="#a78bfa" />
      <text x="83" y="18" class="text-title" font-size="10" fill="#a78bfa">🔍 Gap Analyst</text>
      <text x="83" y="32" class="text-label" font-size="7">Integration Gaps • Shortcuts</text>
      <text x="83" y="44" class="text-label" font-size="7" fill="#818cf8">→ VoteReceipt + LineComments</text>
    </g>

    <!-- Parallel lines from all 4 down to vote aggregation -->
    <path d="M113,107 L113,185" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.5" />
    <path d="M298,107 L298,185" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.5" />
    <path d="M113,169 L113,185" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.5" />
    <path d="M298,169 L298,185" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.5" />

    <!-- Vote Aggregation -->
    <rect x="80" y="185" width="250" height="40" rx="5" fill="#1e1b4b" stroke="#fbbf24" stroke-width="1.5" />
    <text x="205" y="202" class="text-title" font-size="10" fill="#fbbf24">📊 Vote Aggregation</text>
    <text x="205" y="216" class="text-label" font-size="7" fill="#fde68a">approve | reject | request_info</text>

    <!-- Vote Decision Diamond -->
    <path d="M205,225 L205,240" stroke="#fbbf24" stroke-width="1.5" />
    <polygon points="205,240 222,257 205,274 188,257" fill="#3b0764" stroke="#fbbf24" stroke-width="1.5" />
    <text x="205" y="261" fill="#fbbf24" font-size="8" text-anchor="middle" font-weight="bold">V?</text>

    <!-- Reject path → exits council LEFT, straight back to Architect -->
    <!-- From diamond left point (188, 257). Global is 778, 317. -->
    <path d="M188,257 L-130,257 L-130,178" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-red)" />
    <text x="80" y="250" fill="#ef4444" font-size="7" font-weight="bold">Reject</text>

    <!-- Approved path → exits council RIGHT -->
    <path d="M222,257 L420,257" stroke="#34d399" stroke-width="1.5" />
    <text x="310" y="250" fill="#34d399" font-size="7" font-weight="bold">≥ Majority Approve</text>

    <!-- Line Comments note -->
    <text x="210" y="285" class="text-label" font-size="7" fill="#c084fc">All LineComments → prior_comments[]</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- APPROVED → PLAN REVISION → HUMAN → COMPILER → EXECUTOR etc.   -->
  <!-- Spread across the full width, moved UP to fill space           -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <!-- Council approved exit (absolute: council at 590, approve exits at 590+400=990, y=60+257=317) -->

  <!-- ── 6. PLAN REVISION ── -->
  <g transform="translate(1080, 291)">
    <rect x="0" y="0" width="140" height="52" rx="6" stroke="#a855f7" fill="#3b0764" stroke-width="1.5" />
    <text x="70" y="20" class="text-title" font-size="10">📝 Plan Revision</text>
    <text x="70" y="36" class="text-label" font-size="7">Apply LineComments</text>
    <text x="70" y="48" class="text-label" font-size="6" fill="#c084fc">v{n} → v{n+1}</text>
    <circle cx="-5" cy="-5" r="9" fill="#a855f7" />
    <text x="-5" y="-1" class="step-num" text-anchor="middle">6</text>
  </g>

  <!-- Council approve → Plan Revision -->
  <!-- Approve exited council at (1010, 317) -->
  <path d="M1010,317 L1080,317" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)" />

  <!-- 6 → 7 -->
  <path d="M1220,317 L1290,317" stroke="#c084fc" stroke-width="1.5" marker-end="url(#arrow-gold)" />

  <!-- ── 7. HUMAN REVIEW ── -->
  <g transform="translate(1290, 291)">
    <rect x="0" y="0" width="155" height="52" rx="20" fill="#4c1d95" stroke="#fbbf24" stroke-width="2" filter="url(#glow-gold)" />
    <text x="78" y="22" class="text-title" fill="#fbbf24" font-size="10">⏸️ HUMAN REVIEW</text>
    <text x="78" y="38" class="text-label" font-size="7" fill="#fde68a">interrupt_before</text>
    <circle cx="-5" cy="-5" r="9" fill="#fbbf24" />
    <text x="-5" y="-1" class="step-num" text-anchor="middle">7</text>
  </g>

  <!-- Human Reject → back to Architect (loop along bottom) -->
  <path d="M1367,343 L1367,380 L460,380 L460,238" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-red)" />
  <text x="913" y="375" fill="#ef4444" font-size="7" text-anchor="middle">Reject → Architect drafts v{n+1}</text>

  <!-- Human Approve → Compiler -->
  <path d="M1445,317 L1510,317" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)" />
  <text x="1477" y="310" fill="#34d399" font-size="7" font-weight="bold">Approve</text>

  <!-- ── 8. COMPILER ── -->
  <g transform="translate(1510, 294)">
    <rect x="0" y="0" width="120" height="46" rx="6" stroke="#c084fc" fill="#3b0764" stroke-width="1.5" />
    <text x="60" y="19" class="text-title" font-size="10">🔧 Compiler</text>
    <text x="60" y="35" class="text-label" font-size="8">MD → JSON</text>
    <circle cx="-5" cy="-5" r="9" fill="#c084fc" />
    <text x="-5" y="-1" class="step-num" text-anchor="middle">8</text>
  </g>

  <!-- 8 → 9 -->
  <path d="M1630,317 L1690,317" stroke="#c084fc" stroke-width="1.5" marker-end="url(#arrow-emerald)" class="flow-line" />

  <!-- ── 9. EXECUTOR ── -->
  <g transform="translate(1690, 294)">
    <rect x="0" y="0" width="130" height="46" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="2" filter="url(#glow-emerald)" />
    <text x="65" y="19" class="text-title" fill="#34d399" font-size="11">🚀 Executor</text>
    <text x="65" y="35" class="text-label" font-size="8" fill="#6ee7b7">NexusClient API</text>
    <circle cx="-5" cy="-5" r="9" fill="#34d399" />
    <text x="-5" y="-1" class="step-num" text-anchor="middle">9</text>
  </g>

  <!-- 9 → 10 -->
  <path d="M1755,340 L1755,420" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-emerald)" class="flow-line" />

  <!-- ── 10. PROJECT ── -->
  <g transform="translate(1675, 420)">
    <rect x="0" y="0" width="160" height="55" rx="10" stroke="#34d399" fill="#064e3b" stroke-width="2" filter="url(#glow-emerald)" />
    <text x="80" y="23" class="text-title" fill="#34d399" font-size="12">📁 Project</text>
    <text x="80" y="42" class="text-label" font-size="8" fill="#6ee7b7">Supabase</text>
    <circle cx="-5" cy="-5" r="9" fill="#34d399" />
    <text x="-5" y="-1" class="step-num" text-anchor="middle">10</text>
  </g>

  <!-- 10 → 11 -->
  <path d="M1755,475 L1755,500" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-emerald)" class="flow-line" />

  <!-- ── 11. TASKS ── -->
  <g transform="translate(1645, 500)">
    <text x="130" y="0" class="text-title" font-size="11" fill="#22d3ee">Tasks</text>

    <rect x="0" y="10" width="75" height="40" rx="5" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5" />
    <text x="38" y="28" class="text-title" font-size="9" fill="#22d3ee">Task 1</text>
    <text x="38" y="42" class="text-label" font-size="6">idea</text>

    <rect x="85" y="10" width="75" height="40" rx="5" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5" />
    <text x="123" y="28" class="text-title" font-size="9" fill="#22d3ee">Task 2</text>
    <text x="123" y="42" class="text-label" font-size="6">idea</text>

    <rect x="170" y="10" width="75" height="40" rx="5" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5" />
    <text x="208" y="28" class="text-title" font-size="9" fill="#22d3ee">Task 3</text>
    <text x="208" y="42" class="text-label" font-size="6">idea</text>

    <circle cx="-5" cy="5" r="9" fill="#22d3ee" />
    <text x="-5" y="9" class="step-num" text-anchor="middle">11</text>
  </g>

  <!-- 11 → 12 -->
  <path d="M1755,550 L1755,575" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-cyan)" class="flow-line" />

  <!-- ── 12. WORKFLOW SELECTOR ── -->
  <g transform="translate(1645, 575)">
    <rect x="0" y="0" width="245" height="40" rx="6" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5" filter="url(#glow-cyan)" />
    <text x="122" y="24" class="text-title" font-size="11" fill="#22d3ee">Workflow Selector</text>
    <circle cx="-5" cy="5" r="9" fill="#22d3ee" />
    <text x="-5" y="9" class="step-num" text-anchor="middle">12</text>
  </g>

</svg>
