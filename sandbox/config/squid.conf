# Squid Proxy Configuration
# Network allowlist for sandbox containers

# Access Control Lists
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16

acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# Allowed domains for code execution
acl allowed_domains dstdomain .pypi.org
acl allowed_domains dstdomain .pythonhosted.org
acl allowed_domains dstdomain .github.com
acl allowed_domains dstdomain .githubusercontent.com
acl allowed_domains dstdomain .npmjs.org
acl allowed_domains dstdomain .npmjs.com
acl allowed_domains dstdomain registry.npmjs.org
acl allowed_domains dstdomain .r-project.org
acl allowed_domains dstdomain cloud.r-project.org
acl allowed_domains dstdomain cran.r-project.org

# Deny requests to non-safe ports
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow localhost
http_access allow localhost manager
http_access deny manager

# Allow only allowlisted domains
http_access allow allowed_domains
http_access deny all

# Squid port
http_port 3128

# Logging
access_log daemon:/var/log/squid/access.log squid
cache_log /var/log/squid/cache.log

# Minimal caching
cache deny all
